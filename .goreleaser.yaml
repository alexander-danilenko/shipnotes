# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# GoReleaser configuration — https://goreleaser.com
#
# Invoked by .github/workflows/release.yml when a version tag (v*) is pushed.
# It cross-compiles the binary for every supported platform, packages the
# archives and a checksums file, and publishes them as a GitHub release.
#
# Try it locally without publishing:
#   goreleaser release --snapshot --clean   # builds into ./dist, no upload
version: 2

builds:
  - id: shipnotes
    main: .
    binary: shipnotes
    # A statically linked binary (no libc) that runs on any matching OS/arch.
    env:
      - CGO_ENABLED=0
    # -trimpath strips local filesystem paths; the -X flag stamps the git tag
    # into main.version so `shipnotes --version` reports the release.
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: shipnotes
    # e.g. shipnotes_1.2.0_linux_amd64.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    # Windows users expect a .zip rather than a .tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  # Keep the auto-generated notes focused on user-facing changes.
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  # Tags like v1.2.0-rc.1 are published as GitHub pre-releases automatically.
  prerelease: auto
